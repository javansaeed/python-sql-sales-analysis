name: SQL Sales Analytics

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2019-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "YourStrong!Passw0rd"
        ports:
          - 1433:1433

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Install SQL Server Tools
      run: |
        sudo apt-get update
        sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
    - name: Wait for SQL Server
      run: |
        sleep 30
        
    - name: Show files
      run: |
        pwd
        ls -la
        echo "----- DATA -----"
        ls -la data
    - name: Show Docker containers
      run: docker ps -a

    - name: Copy backup into SQL Server container
      run: |
        CONTAINER=$(docker ps -q --filter "ancestor=mcr.microsoft.com/mssql/server:2019-latest")
        echo "Container: $CONTAINER"

        docker cp data/TSQLV4.bak $CONTAINER:/var/opt/mssql/data/TSQLV4.bak
    
    - name: Verify backup inside container
      run: |
        CONTAINER=$(docker ps -q --filter "ancestor=mcr.microsoft.com/mssql/server:2019-latest")

        docker exec $CONTAINER ls -lh /var/opt/mssql/data
    
    - name: Test SQL Connection
      run: |
        /opt/mssql-tools18/bin/sqlcmd \
        -S localhost \
        -U sa \
        -P "YourStrong!Passw0rd" \
        -C \
        -Q "SELECT @@VERSION"
    - name: Show Backup File Information
      run: |
        /opt/mssql-tools18/bin/sqlcmd \
        -S localhost \
        -U sa \
        -P "YourStrong!Passw0rd" \
        -C \
        -Q "RESTORE FILELISTONLY FROM DISK = 'python-sql-sales-analysis/data/TSQLV4.bak'"
